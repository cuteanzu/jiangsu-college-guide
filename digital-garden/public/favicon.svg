<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Scholarium</title>

  <defs>
    <linearGradient id="bg" x1="160" y1="160" x2="864" y2="864" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3A2F28"/>
      <stop offset="1" stop-color="#1E1714"/>
    </linearGradient>

    <linearGradient id="accent" x1="200" y1="400" x2="820" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#C76B5E"/>
      <stop offset="1" stop-color="#9B4A3E"/>
    </linearGradient>

    <linearGradient id="gold" x1="400" y1="200" x2="600" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E8D5B0"/>
      <stop offset="1" stop-color="#BA9A6A"/>
    </linearGradient>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="24" flood-color="#C76B5E" flood-opacity="0.35"/>
    </filter>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#E8D5B0" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- background circle -->
  <circle cx="512" cy="512" r="440" fill="url(#bg)" stroke="#C76B5E" stroke-width="3" opacity="0.9"/>

  <!-- outer ring — 天下 / celestial sphere -->
  <circle cx="512" cy="512" r="388" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.25"/>
  <circle cx="512" cy="512" r="340" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.18"/>

  <!-- latitude lines — globe / 天下 feeling -->
  <ellipse cx="512" cy="512" rx="310" ry="80" fill="none" stroke="url(#gold)" stroke-width="1.2" opacity="0.22"/>
  <ellipse cx="512" cy="512" rx="310" ry="160" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.15"/>

  <!-- meridian lines -->
  <ellipse cx="512" cy="512" rx="80" ry="310" fill="none" stroke="url(#gold)" stroke-width="1.2" opacity="0.18"/>
  <ellipse cx="512" cy="512" rx="160" ry="310" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.12"/>

  <!-- poles / axis dots -->
  <circle cx="512" cy="202" r="6" fill="url(#gold)" opacity="0.5"/>
  <circle cx="512" cy="822" r="6" fill="url(#gold)" opacity="0.5"/>

  <!-- open book at center -->
  <g filter="url(#glow)">
    <!-- left page -->
    <path d="M512 560
             C480 520 400 470 340 466
             C310 464 288 476 280 496
             L280 720
             C288 700 310 688 340 690
             C400 694 480 720 512 740Z"
          fill="url(#accent)" opacity="0.9"/>

    <!-- right page -->
    <path d="M512 560
             C544 520 624 470 684 466
             C714 464 736 476 744 496
             L744 720
             C736 700 714 688 684 690
             C624 694 544 720 512 740Z"
          fill="url(#accent)" opacity="0.95"/>

    <!-- page highlight / spine -->
    <line x1="512" y1="560" x2="512" y2="740" stroke="url(#gold)" stroke-width="2" opacity="0.3"/>
  </g>

  <!-- book upper edges (gold trim) -->
  <path d="M340 466 L512 560 L684 466" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.5"/>

  <!-- small star / sparkle at top right -->
  <g transform="translate(640 280)" opacity="0.7">
    <path d="M0 -18 L4 -4 L18 0 L4 4 L0 18 L-4 4 L-18 0 L-4 -4Z" fill="url(#gold)"/>
  </g>

  <!-- small sparkle bottom left -->
  <g transform="translate(380 740)" opacity="0.5">
    <path d="M0 -10 L2 -2 L10 0 L2 2 L0 10 L-2 2 L-10 0 L-2 -2Z" fill="url(#gold)"/>
  </g>

  <!-- subtle grid dots suggesting map -->
  <g fill="url(#gold)" opacity="0.08">
    <circle cx="280" cy="380" r="2"/>
    <circle cx="350" cy="350" r="2"/>
    <circle cx="420" cy="320" r="2"/>
    <circle cx="600" cy="320" r="2"/>
    <circle cx="670" cy="350" r="2"/>
    <circle cx="740" cy="380" r="2"/>
    <circle cx="280" cy="640" r="2"/>
    <circle cx="350" cy="670" r="2"/>
    <circle cx="420" cy="700" r="2"/>
    <circle cx="600" cy="700" r="2"/>
    <circle cx="670" cy="670" r="2"/>
    <circle cx="740" cy="640" r="2"/>
  </g>

  <!-- outer ring border -->
  <circle cx="512" cy="512" r="432" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.12"/>
</svg>
